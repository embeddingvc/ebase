name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.1.0)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            VER="${INPUT_VERSION}"
          else
            VER="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"

      - name: Verify VERSION file matches tag
        env:
          TAG_VER: ${{ steps.version.outputs.version }}
        run: |
          FILE_VER="$(tr -d '[:space:]' < VERSION)"
          if [ "${FILE_VER}" != "${TAG_VER}" ]; then
            echo "ERROR: VERSION file (${FILE_VER}) does not match tag (${TAG_VER})" >&2
            exit 1
          fi
          echo "VERSION file matches tag: ${FILE_VER}"

      - name: Extract changelog for this version
        id: changelog
        env:
          VER: ${{ steps.version.outputs.version }}
        run: |
          NOTES="$(python3 -c "
          import re, sys, os
          text = open('CHANGELOG.md').read()
          ver = os.environ['VER']
          pattern = rf'## \[{re.escape(ver)}\].*?\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          print(m.group(1).strip() if m else 'Release v' + ver)
          ")"
          echo "${NOTES}" > /tmp/release-notes.md
          echo "notes_file=/tmp/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: v${{ steps.version.outputs.version }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: false
