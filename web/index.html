<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Claude cowork — LinkedIn Outreach</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <div>
          <h1>Claude cowork</h1>
          <p class="tagline">Local wrap for <code>claude</code> — same repo, headless <code>-p</code> runs</p>
        </div>
      </div>
      <div class="topbar-meta">
        <span class="pill" id="conn-pill">127.0.0.1</span>
      </div>
    </header>

    <main class="main">
      <section class="chat" id="chat" aria-live="polite"></section>

      <form class="composer" id="form" autocomplete="off">
        <div class="composer-row">
          <label class="field full">
            <span class="label">Permission mode</span>
            <select id="perm" name="perm">
              <option value="dontAsk" selected>dontAsk</option>
              <option value="acceptEdits">acceptEdits</option>
              <option value="auto">auto</option>
              <option value="default">default</option>
              <option value="plan">plan</option>
              <option value="bypassPermissions">bypassPermissions</option>
            </select>
          </label>
        </div>
        <label class="field full">
          <span class="label">Message</span>
          <textarea id="prompt" name="prompt" rows="4" placeholder="Ask Claude to run something in this workspace…" required></textarea>
        </label>
        <div class="composer-actions">
          <button type="button" class="btn ghost" id="clear">Clear chat</button>
          <button type="submit" class="btn primary" id="send">
            <span class="btn-label">Send to Claude</span>
            <span class="btn-spinner" hidden aria-hidden="true"></span>
          </button>
        </div>
      </form>
    </main>

    <footer class="foot">
      <p>Runs <code>claude -p</code> in the repo root. Requires the <strong>Claude Code</strong> CLI on your <code>PATH</code> (same auth you use in the terminal).</p>
    </footer>
  </div>
  <script src="/app.js" type="module"></script>
</body>
</html>
